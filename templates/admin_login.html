{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Portal</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0b2239;
    }

    .container {
        text-align: center;
        color: white;
    }

    .icon {
        width: 60px;
        height: 60px;
        background: rgba(255, 204, 0, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 24px;
        color: #ffcc00;
    }

    h1 {
        margin-bottom: 10px;
    }

    .subtitle {
        color: #a0b3c6;
        margin-bottom: 30px;
        font-size: 14px;
    }

    .login-box {
        background: #132c47;
        padding: 30px;
        border-radius: 12px;
        width: 350px;
        margin: auto;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        text-align: left;
    }

    label {
        font-size: 14px;
        margin-bottom: 5px;
        display: block;
        color: #cbd5e1;
    }

    .input-group {
        position: relative;
        margin-bottom: 20px;
    }

    .input-group input {
        width: 100%;
        padding: 12px 12px 12px 40px;
        border-radius: 8px;
        border: 1px solid #2d4a66;
        background: #0f2235;
        color: white;
        outline: none;
    }

    .input-group span {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #7aa6d1;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #d4a72c;
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #f0c244;
    }

    .error-message {
        color: #ff6b6b;
        margin-bottom: 15px;
        font-size: 14px;
    }

    .demo {
        margin-top: 15px;
        font-size: 12px;
        color: #9fb3c8;
        text-align: center;
    }
</style>
</head>

<body>

<div class="container">
    <div class="icon">🛡️</div>
    <h1>Admin Portal</h1>
    <p class="subtitle">Sign in to access the management dashboard</p>

    <div class="login-box">

        <!-- Django Messages -->
        {% if messages %}
            {% for message in messages %}
                <p class="error-message">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <label>Admin Email</label>
            <div class="input-group">
                <span>📧</span>
                <input type="text" name="username" placeholder="admin@luxestay.com" required>
            </div>

            <label>Password</label>
            <div class="input-group">
                <span>🔒</span>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Sign In to Dashboard</button>
        </form>

        <p class="demo">Demo credentials: admin@luxestay.com / admin123</p>
    </div>
</div>

</body>
</html>
