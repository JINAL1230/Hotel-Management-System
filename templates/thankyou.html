<!DOCTYPE html>
<html>
<head>
<title>Login Success</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#06192b,#020d18);
    color:white;
    font-family:Segoe UI;
}

.box{
    background:#1d2a3a;
    padding:40px;
    border-radius:12px;
    text-align:center;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h1{
    color:#ffd23f;
    margin-bottom:10px;
}

p{
    color:#a7b6c7;
}

.username{
    color:#00e6e6;
    font-weight:bold;
}

a{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    background:#ffd23f;
    color:black;
    text-decoration:none;
    font-weight:bold;
    border-radius:6px;
}



a:hover{
    opacity:0.9;
}
</style>

</head>

<body>

<div class="box">
    <h1>Login Successful 🎉</h1>

    <p>Welcome</p>

    <p>You are now logged in to LuxeStay</p>

    <a href="/">Go to Home</a>
</div>

</body>
</html>
